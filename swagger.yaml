      summary: "Register a child profile"
      description: |
          Creates a new child profile under a parent's account. This is a public endpoint - no authentication required.
          
          **Important:** Children login using ONLY their username (no password needed).
          The username is used directly for authentication.
          
      security: []
      requestBody:
        required: true
