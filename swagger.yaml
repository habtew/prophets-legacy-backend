  /children/login:
    post:
      tags:
        - "Children"
      summary: "Child login (Username Only - No Password!)"
      description: |
          Authenticates a child using ONLY their username (no password required).
          Children use a simplified login flow for ease of use.
          Returns a JWT token that should be used in Authorization header for subsequent requests.
          
          **How to Test in Swagger:**
          1. Click "Try it out"
          2. Enter only the username (e.g., "AminaStar")
          3. Click "Execute"
          4. Copy the token from the response
          5. Click "Authorize" button at the top of the page
          6. Paste: `Bearer YOUR_TOKEN`
          7. Click "Authorize" then "Close"
          8. Now you can test all child endpoints!
          
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required:
                - "username"
              properties:
                username:
                  type: "string"
                  example: "AminaStar"
                  description: "The child's unique username (password NOT required)"

      responses:
        200:
          description: "Login successful"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  token:
                    type: "string"
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    description: "JWT token - use this in Authorization header as \"Bearer {token}\""

                  user:
                    type: "object"
                    properties:
                      id:
                        type: "string"
                        format: "uuid"
                        example: "6c73902e-34b4-45cc-9011-060cdf63ba77"

                      username:
                        type: "string"
                        example: "AminaStar"

                      displayName:
                        type: "string"
                        example: "Amina"

                      role:
                        type: "string"
                        example: "child"

                      level:
                        type: "integer"
                        example: 1

                      stars:
                        type: "integer"
                        example: 45

                      avatarUrl:
                        type: "string"
                        nullable: true
                        example: null

        400:
          description: "Username missing"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: false

                  message:
                    type: "string"
                    example: "Username is required"

        401:
          description: "Invalid username"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: false

                  message:
                    type: "string"
                    example: "Invalid username - child not found"

        500:
          description: "Server error"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: false

                  message:
                    type: "string"
                    example: "Database error"

                  details:
                    type: "string"

