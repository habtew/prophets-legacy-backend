                username:
                  type: "string"
                  example: "AminaStar"
                  description: "Unique username for the child (used for login)"

                displayName:
                  type: "string"
                  example: "Amina"
                  description: "Display name for the child"

                ageGroup:
                  type: "string"
                  example: "8-10"
                  description: "Age group (e.g. 5-7, 8-10, 11-13)"

                avatarUrl:
                  type: "string"
                  format: "uri"
                  nullable: true
                  description: "Optional avatar URL"

      responses:
        201:
          description: "Child profile created successfully"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: true

                  childId:
                    type: "string"
                    format: "uuid"
                    example: "6c73902e-34b4-45cc-9011-060cdf63ba77"

                  username:
                    type: "string"
                    example: "AminaStar"

                  message:
                    type: "string"
                    example: "Child profile created successfully. Use the username to login."

        400:
          description: "Missing required fields or invalid data"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: false

                  message:
                    type: "string"
                    example: "parentId, username, displayName, and ageGroup are required"

        404:
          description: "Parent not found"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: false

                  message:
                    type: "string"
                    example: "Parent not found"

        409:
          description: "Username already exists"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: false

                  message:
                    type: "string"
                    example: "Username already exists"

