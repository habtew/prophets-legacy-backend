        - "Children"
      summary: "Upload child avatar"
      description: |
          Uploads an avatar image for the authenticated child.
          
          **How to Upload:**
          1. Convert your image to base64 (use online tool or code)
          2. Include the base64 string in the request body
          3. Specify the file name with extension (.jpg, .png, etc.)
          
          **Limits:**
          - Maximum file size: 2MB
          - Allowed formats: JPG, PNG, GIF, WEBP
          
          **Returns:**
          - Public URL to the uploaded avatar
          - Automatically updates child's profile with new avatar URL
          
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required:
                - "file"
              properties:
                file:
                  type: "string"
                  description: "Base64 encoded image data (with or without data URI prefix)"
                  example: |
                      data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==

                fileName:
                  type: "string"
                  description: "Name of the file with extension"
                  example: "avatar.png"

      responses:
        200:
          description: "Avatar uploaded successfully"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: true

                  message:
                    type: "string"
                    example: "Avatar uploaded successfully"

                  avatarUrl:
                    type: "string"
                    format: "uri"
                    example: |
                        https://your-project.supabase.co/storage/v1/object/public/avatars/child-id_1234567890.png

        400:
          description: "Invalid file or missing data"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: false

                  message:
                    type: "string"
                    example: "File too large. Maximum size is 2MB"

        401:
          $ref: |
              #/components/responses/UnauthorizedError

        500:
          description: "Upload failed"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  success:
                    type: "boolean"
                    example: false

                  message:
                    type: "string"
                    example: "Failed to upload avatar"

                  details:
